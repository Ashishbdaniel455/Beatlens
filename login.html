<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BeatLens — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a26;
      --border: #2a2a3d; --accent: #00f5c4; --accent2: #ff4081; --accent3: #7b5cff;
      --text: #e8e8f0; --text2: #9090b8; --text3: #5a5a7a;
      --font: 'Syne',sans-serif; --mono: 'Space Mono',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body {
      background:var(--bg); color:var(--text); font-family:var(--font);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      overflow:hidden; position:relative;
    }
    /* Animated grid */
    .bg-grid {
      position:fixed; inset:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(0,245,196,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,245,196,.025) 1px,transparent 1px);
      background-size:40px 40px;
    }
    /* Glow orbs */
    .orb {
      position:fixed; border-radius:50%; pointer-events:none;
      filter:blur(80px); opacity:.12; animation:orbFloat 8s ease-in-out infinite;
    }
    .orb1 { width:400px;height:400px;background:var(--accent3);top:-100px;left:-100px; }
    .orb2 { width:300px;height:300px;background:var(--accent);bottom:-80px;right:-80px;animation-delay:3s; }
    .orb3 { width:200px;height:200px;background:var(--accent2);top:40%;right:20%;animation-delay:5s; }
    @keyframes orbFloat {
      0%,100%{transform:translateY(0) scale(1)}
      50%{transform:translateY(-30px) scale(1.05)}
    }

    /* Card */
    .auth-card {
      position:relative; z-index:1;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:20px;
      padding:40px 44px;
      width:100%; max-width:420px;
      box-shadow:0 32px 80px rgba(0,0,0,.6), 0 0 0 1px var(--border);
      animation:cardIn .4s cubic-bezier(.4,0,.2,1);
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}

    /* Logo */
    .auth-logo {
      display:flex; align-items:center; gap:10px; margin-bottom:28px;
    }
    .auth-logo-icon { font-size:1.8rem; }
    .auth-logo-text {
      font-size:1.5rem; font-weight:800; letter-spacing:-.5px;
      color:var(--accent); text-shadow:0 0 20px rgba(0,245,196,.4);
    }

    /* Tabs */
    .auth-tabs {
      display:flex; background:var(--surface2); border-radius:10px;
      padding:4px; margin-bottom:28px; gap:4px;
    }
    .auth-tab {
      flex:1; padding:9px; border:none; border-radius:8px;
      background:transparent; color:var(--text3);
      font-family:var(--mono); font-size:.75rem; font-weight:700;
      cursor:pointer; transition:.2s;
    }
    .auth-tab.active {
      background:var(--surface); color:var(--accent);
      box-shadow:0 0 12px rgba(0,245,196,.1);
    }

    /* Form */
    .auth-form { display:flex; flex-direction:column; gap:16px; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-label { font-family:var(--mono); font-size:.68rem; color:var(--text3); text-transform:uppercase; letter-spacing:.1em; }
    .form-input {
      background:var(--surface2); border:1px solid var(--border);
      color:var(--text); font-family:var(--mono); font-size:.88rem;
      padding:12px 14px; border-radius:10px; outline:none;
      transition:.2s; width:100%;
    }
    .form-input:focus { border-color:var(--accent); box-shadow:0 0 12px rgba(0,245,196,.1); }
    .form-input::placeholder { color:var(--text3); }

    .password-wrap { position:relative; }
    .password-toggle {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:var(--text3); cursor:pointer;
      font-size:.9rem; padding:4px;
    }
    .password-toggle:hover { color:var(--accent); }

    /* Password strength */
    .pw-strength { margin-top:6px; }
    .pw-strength-bar {
      height:3px; background:var(--surface2); border-radius:3px; overflow:hidden;
    }
    .pw-strength-fill {
      height:100%; border-radius:3px; transition:width .3s,background .3s;
      width:0%;
    }
    .pw-strength-label { font-family:var(--mono); font-size:.62rem; color:var(--text3); margin-top:4px; }

    /* Submit button */
    .auth-submit {
      background:var(--accent); color:#000;
      border:none; font-family:var(--font);
      font-size:.9rem; font-weight:800;
      padding:13px; border-radius:10px; cursor:pointer;
      transition:.2s; margin-top:4px;
      box-shadow:0 0 20px rgba(0,245,196,.2);
    }
    .auth-submit:hover { background:#00ffd0; box-shadow:0 0 30px rgba(0,245,196,.4); transform:translateY(-1px); }
    .auth-submit:active { transform:translateY(0); }
    .auth-submit:disabled { opacity:.5; cursor:not-allowed; transform:none; }

    /* Error / success messages */
    .auth-msg {
      font-family:var(--mono); font-size:.75rem; padding:10px 14px;
      border-radius:8px; display:none; margin-top:4px;
    }
    .auth-msg.error   { background:rgba(255,64,129,.1); border:1px solid var(--accent2); color:var(--accent2); display:block; }
    .auth-msg.success { background:rgba(0,245,196,.1);  border:1px solid var(--accent);  color:var(--accent);  display:block; }

    /* Divider */
    .auth-divider {
      display:flex; align-items:center; gap:12px;
      font-family:var(--mono); font-size:.65rem; color:var(--text3); margin:4px 0;
    }
    .auth-divider::before,.auth-divider::after {
      content:''; flex:1; height:1px; background:var(--border);
    }

    /* Footer */
    .auth-footer { margin-top:20px; text-align:center; font-family:var(--mono); font-size:.7rem; color:var(--text3); }
    .auth-footer a { color:var(--accent); cursor:pointer; }

    /* Loading spinner inside button */
    .btn-spinner {
      display:inline-block; width:14px; height:14px;
      border:2px solid rgba(0,0,0,.3); border-top-color:#000;
      border-radius:50%; animation:spin .7s linear infinite;
      vertical-align:middle; margin-right:6px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Features preview */
    .auth-features {
      margin-top:24px; display:flex; flex-direction:column; gap:8px;
    }
    .auth-feat {
      display:flex; align-items:center; gap:8px;
      font-family:var(--mono); font-size:.72rem; color:var(--text3);
    }
    .auth-feat-dot { width:6px; height:6px; border-radius:50%; background:var(--accent3); flex-shrink:0; }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-icon">🎵</div>
    <div class="auth-logo-text">BeatLens</div>
  </div>

  <div class="auth-tabs">
    <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
    <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Create Account</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="formLogin">
    <div class="auth-form">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="loginUser" type="text" placeholder="your username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrap">
          <input class="form-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password"/>
          <button class="password-toggle" onclick="togglePw('loginPass',this)" type="button">👁</button>
        </div>
      </div>
      <div class="auth-msg" id="loginMsg"></div>
      <button class="auth-submit" id="loginBtn" onclick="doLogin()">Sign In</button>
    </div>
  </div>

  <!-- REGISTER FORM -->
  <div id="formRegister" style="display:none">
    <div class="auth-form">
      <div class="form-group">
        <label class="form-label">Choose a username</label>
        <input class="form-input" id="regUser" type="text" placeholder="min. 3 characters" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrap">
          <input class="form-input" id="regPass" type="password" placeholder="min. 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)"/>
          <button class="password-toggle" onclick="togglePw('regPass',this)" type="button">👁</button>
        </div>
        <div class="pw-strength">
          <div class="pw-strength-bar"><div class="pw-strength-fill" id="pwFill"></div></div>
          <div class="pw-strength-label" id="pwLabel">Enter a password</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm password</label>
        <div class="password-wrap">
          <input class="form-input" id="regPass2" type="password" placeholder="repeat password" autocomplete="new-password"/>
        </div>
      </div>
      <div class="auth-msg" id="regMsg"></div>
      <button class="auth-submit" id="regBtn" onclick="doRegister()">Create Account</button>
    </div>

    <div class="auth-features">
      <div class="auth-feat"><div class="auth-feat-dot"></div>Your songs & playlists saved privately</div>
      <div class="auth-feat"><div class="auth-feat-dot"></div>BPM, key & chord analysis per song</div>
      <div class="auth-feat"><div class="auth-feat-dot"></div>Real-time chord detector while playing</div>
    </div>
  </div>

  <div class="auth-footer" id="authFooter">
    Don't have an account? <a onclick="switchTab('register')">Create one →</a>
  </div>
</div>

<script>
// Auto-detect: local dev uses localhost, cloud uses same origin
const _isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const API = _isLocal ? 'http://localhost:8000' : window.location.origin;

function switchTab(tab) {
  document.getElementById('formLogin').style.display    = tab==='login'    ? '' : 'none';
  document.getElementById('formRegister').style.display = tab==='register' ? '' : 'none';
  document.getElementById('tabLogin').classList.toggle('active',    tab==='login');
  document.getElementById('tabRegister').classList.toggle('active', tab==='register');
  document.getElementById('authFooter').innerHTML = tab==='login'
    ? "Don't have an account? <a onclick=\"switchTab('register')\">Create one →</a>"
    : "Already have an account? <a onclick=\"switchTab('login')\">Sign in →</a>";
  clearMsgs();
}

function clearMsgs() {
  ['loginMsg','regMsg'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent=''; el.className='auth-msg';
  });
}

function showMsg(id, text, type='error') {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className   = 'auth-msg ' + type;
}

function togglePw(inputId, btn) {
  const inp = document.getElementById(inputId);
  inp.type  = inp.type==='password' ? 'text' : 'password';
  btn.textContent = inp.type==='password' ? '👁' : '🙈';
}

function checkStrength(pw) {
  const fill  = document.getElementById('pwFill');
  const label = document.getElementById('pwLabel');
  let score=0, msg='', color='';
  if (pw.length>=6)  score++;
  if (pw.length>=10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [
    {pct:0,   color:'transparent', msg:'Enter a password'},
    {pct:20,  color:'#ff4081',     msg:'Very weak'},
    {pct:40,  color:'#ff9800',     msg:'Weak'},
    {pct:60,  color:'#ffb700',     msg:'Fair'},
    {pct:80,  color:'#7b5cff',     msg:'Strong'},
    {pct:100, color:'#00f5c4',     msg:'Very strong 💪'},
  ];
  const lv = levels[Math.min(score, 5)];
  fill.style.width      = lv.pct + '%';
  fill.style.background = lv.color;
  label.textContent     = pw.length ? lv.msg : 'Enter a password';
}

async function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!user || !pass) { showMsg('loginMsg','Please fill in all fields'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span>Signing in…';

  try {
    const res = await fetch(API+'/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:user, password:pass})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Login failed');
    localStorage.setItem('bl_token',    data.token);
    localStorage.setItem('bl_username', data.username);
    localStorage.setItem('bl_user_id',  data.user_id);
    showMsg('loginMsg','Welcome back, '+data.username+'! Redirecting…','success');
    setTimeout(()=>{ window.location.href='index.html'; }, 800);
  } catch(e) {
    showMsg('loginMsg', e.message);
    btn.disabled=false; btn.innerHTML='Sign In';
  }
}

async function doRegister() {
  const user  = document.getElementById('regUser').value.trim();
  const pass  = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;

  if (!user || !pass || !pass2) { showMsg('regMsg','Please fill in all fields'); return; }
  if (user.length < 3)          { showMsg('regMsg','Username must be at least 3 characters'); return; }
  if (pass.length < 6)          { showMsg('regMsg','Password must be at least 6 characters'); return; }
  if (pass !== pass2)           { showMsg('regMsg','Passwords do not match'); return; }

  const btn = document.getElementById('regBtn');
  btn.disabled=true; btn.innerHTML='<span class="btn-spinner"></span>Creating account…';

  try {
    const res = await fetch(API+'/api/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:user, password:pass})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Registration failed');
    localStorage.setItem('bl_token',    data.token);
    localStorage.setItem('bl_username', data.username);
    localStorage.setItem('bl_user_id',  data.user_id);
    showMsg('regMsg','Account created! Welcome, '+data.username+'!','success');
    setTimeout(()=>{ window.location.href='index.html'; }, 900);
  } catch(e) {
    showMsg('regMsg', e.message);
    btn.disabled=false; btn.innerHTML='Create Account';
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key!=='Enter') return;
  if (document.getElementById('formLogin').style.display!=='none') doLogin();
  else doRegister();
});

// Redirect if already logged in
if (localStorage.getItem('bl_token')) {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
